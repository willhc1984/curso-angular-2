<div class="py-10 bg-gradient-to-r from-blue-500 to-blue-700 text-white flex flex-col justify-center items-center">
    <div class="text-center px-6">
        <h1 class="text-4xl font-bold mb-4">Bem vindo a sua lista de lugares favoritos!</h1>
        <p class="text-lg mb-6">Explore, organize e compartilhe os lugares incriveis que você gosta.</p>

        <button (click)="navegar()" *ngIf="isLoggedIn()"
            class="bg-white text-blue-400 font-semibold px-8 py-3 rounded-full hover:bg-gray-100 flex space-x-3 items-center">
            Olá {{ profile?.name }}, clique aqui para aproveitar o site.
        </button>

        <button (click)="logarComGoogle()" *ngIf="!isLoggedIn()"
            class="bg-white text-blue-700 font-semibold px-8 py-3 rounded-full hover:bg-gray-100 flex space-x-3 items-center">
            <img src="google.png" width="30px" />Logar com Google
        </button>
    </div>
</div>
